  guard_agent_created: false
  creation_nudge_interval: 15
honcho: {}
timezone: ''
discord:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  auto_thread: true
  reactions: true
  channel_prompts: {}
  server_actions: ''
whatsapp: {}
slack:
  require_mention: true
  channel_prompts:
    "": |
      You are the Dremes ad agent on Slack. You serve exactly ONE brand — the one the user onboards with you here.
      You do NOT handle Island Splash, Cinco H Ranch, or Royal Pop. Those are Telegram-only brands.
      If no brand has been onboarded yet, guide the user through the onboarding process:
      1. Ask: "Brand name?" → set display_name + auto slug
      2. Ask: "Products? (comma-sep names)" → e.g. Soap, Cream, Sunscreen
      3. Ask: "One ref pool per product, or one pool for the whole brand?"
      4. Ask: "Send your logo" → extract palette with colorthief
      5. Ask: "Send product images" → one per product
      6. Run the onboarding script to create the brand
      7. After onboarding: "Send a Pinterest board URL to drain refs, or send ref images directly"
      Once the brand is onboarded, you ONLY serve that brand. All ads, refs, gallery links, posts, and operations are for this brand alone.
      Never mention or offer other brands. Never suggest switching brands.
telegram:
  channel_prompts: {}
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
command_allowlist:
  - force kill processes
  - overwrite project env/config via redirection
  - delete in root path
  - recursive delete
  - SQL TRUNCATE
  - script execution via heredoc
  - script execution via -e/-c flag
  - shell command via -c/-lc flag
quick_commands: {}
hooks: {}
hooks_auto_accept: false
personalities: {}
security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
