<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Post Review</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e1e1e6;min-height:100vh}
nav{background:#0f0f16;border-bottom:1px solid #1f1f2a;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1.5rem;position:sticky;top:0;z-index:100}
nav a{color:#71717a;text-decoration:none;font-size:.9rem}
nav a:hover{color:#e1e1e6}
nav .brand-name{font-weight:600;font-size:1rem;color:#f0f0ff;margin-right:auto}
nav .nav-links{display:flex;gap:.25rem}
nav .nav-links a{padding:.4rem .8rem;border-radius:8px}
nav .nav-links a.active{background:#181825;color:#f0f0ff}
.app{display:grid;grid-template-columns:300px minmax(0,1fr) 360px;min-height:calc(100vh - 57px)}
.sidebar{border-right:1px solid #1f1f2a;background:#0f0f16;padding:1rem;overflow:auto}
.workspace{padding:1rem;overflow:auto}
.tools{border-left:1px solid #1f1f2a;background:#0f0f16;padding:1rem;overflow:auto}
.filters{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.8rem}
button{font-family:inherit}
.filters button,.btn{border:1px solid #1f1f2a;background:#121218;color:#a1a1aa;border-radius:8px;padding:.48rem .7rem;cursor:pointer;font-size:.82rem}
.filters button.active,.btn.primary{background:#1a1a2e;border-color:#6366f1;color:#d8d8ff}
.btn.good{border-color:#1a3a1a;color:#4ade80}
.btn.danger{border-color:#3a1a1a;color:#f87171}
.btn:disabled{opacity:.45;cursor:not-allowed}
.post-row{border:1px solid #1f1f2a;background:#121218;border-radius:10px;padding:.75rem;margin-bottom:.55rem;cursor:pointer}
.post-row.active{border-color:#6366f1;background:#181825}
.post-row .title{font-size:.86rem;color:#f0f0ff;margin-bottom:.35rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-row .meta{font-size:.75rem;color:#71717a;display:flex;gap:.35rem;flex-wrap:wrap}
.badge{display:inline-block;border:1px solid #1f1f2a;background:#181825;color:#a1a1aa;border-radius:6px;padding:2px 7px;font-size:.72rem}
.badge.needs_review{color:#a78bfa;border-color:#383850}
.badge.approved{color:#4ade80;border-color:#1a3a1a}
.badge.scheduled{color:#38bdf8;border-color:#164e63}
.badge.rejected,.badge.failed{color:#f87171;border-color:#3a1a1a}
.topline{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.topline h1{font-size:1.2rem;font-weight:650;color:#f0f0ff}
.topline .spacer{flex:1}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.75rem}
.image-card{background:#121218;border:1px solid #1f1f2a;border-radius:10px;overflow:hidden}
.image-card img{width:100%;height:260px;object-fit:contain;background:#050509;display:block}
.image-card .image-name{font-size:.72rem;color:#71717a;padding:.55rem .65rem;word-break:break-all}
.image-card .actions{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;padding:0 .65rem .65rem}
.image-card .actions button{border:1px solid #1f1f2a;background:#0f0f16;color:#a1a1aa;border-radius:7px;padding:.38rem;font-size:.75rem;cursor:pointer}
.image-card .actions button.danger{color:#f87171;border-color:#3a1a1a}
.image-card .actions button.warn{color:#fbbf24;border-color:#4a3410}
.panel{border-bottom:1px solid #1f1f2a;padding-bottom:1rem;margin-bottom:1rem}
.panel h2{font-size:.85rem;color:#f0f0ff;margin-bottom:.65rem}
textarea{width:100%;min-height:180px;background:#0a0a0f;border:1px solid #1f1f2a;color:#e1e1e6;border-radius:8px;padding:.75rem;resize:vertical;line-height:1.45;font-family:inherit}
.platforms{display:flex;gap:.45rem;flex-wrap:wrap}
.toggle{display:flex;align-items:center;gap:.45rem;border:1px solid #1f1f2a;background:#121218;border-radius:8px;padding:.5rem .65rem;color:#a1a1aa;font-size:.84rem;cursor:pointer}
.toggle input{accent-color:#6366f1}
.stack{display:flex;flex-direction:column;gap:.5rem}
.status-line{font-size:.8rem;color:#71717a;line-height:1.45}
.empty,.loading,.error{text-align:center;padding:3rem;color:#52525b}
.error{color:#f87171}
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:#181825;border:1px solid #1f1f2a;border-radius:10px;padding:.75rem 1rem;display:none;z-index:200}
.toast.show{display:block}
select{width:100%;background:#0a0a0f;border:1px solid #1f1f2a;color:#e1e1e6;border-radius:8px;padding:.55rem}
@media(max-width:980px){.app{grid-template-columns:1fr}.sidebar,.tools{border:0;border-bottom:1px solid #1f1f2a}.workspace{order:2}.tools{order:3}.image-card img{height:220px}}
</style>
</head>
<body>
<nav>
  <a href="/">← Brands</a>
  <span class="brand-name" id="brand-name"></span>
  <div class="nav-links">
    <a href="#" id="nav-refs">Refs</a>
    <a href="#" id="nav-ads">Ads</a>
    <a href="#" class="active" id="nav-posts">Posts</a>
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div class="filters" id="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="needs_review">Review</button>
      <button data-filter="approved">Approved</button>
      <button data-filter="scheduled">Scheduled</button>
      <button data-filter="rejected">Rejected</button>
    </div>
    <div class="status-line" id="count-line"></div>
    <div id="post-list"></div>
  </aside>

  <main class="workspace">
    <div class="topline">
      <h1 id="post-title">Posts</h1>
      <span id="post-status" class="badge"></span>
      <div class="spacer"></div>
      <button class="btn" onclick="loadAll()">Refresh</button>
    </div>
    <div id="preview"></div>
  </main>

  <aside class="tools">
    <div class="panel">
      <h2>Caption</h2>
      <textarea id="caption"></textarea>
      <div class="stack" style="margin-top:.55rem">
        <button class="btn primary" id="save-caption" onclick="saveCaption()">Save Caption</button>
        <button class="btn" id="regen-caption" onclick="regenerateCaption()">Regenerate Caption</button>
      </div>
    </div>
    <div class="panel">
      <h2>Platforms</h2>
      <div class="platforms">
        <label class="toggle"><input type="checkbox" value="instagram" onchange="savePlatforms()"> Instagram</label>
        <label class="toggle"><input type="checkbox" value="facebook" onchange="savePlatforms()"> Facebook</label>
      </div>
    </div>
    <div class="panel">
      <h2>Replace / Add Ad</h2>
      <select id="approved-picker"></select>
      <div class="stack" style="margin-top:.55rem">
        <button class="btn" onclick="addApprovedAd()">Add Approved Ad</button>
      </div>
    </div>
    <div class="panel">
      <h2>Final Actions</h2>
      <div class="stack">
        <button class="btn good" id="approve-btn" onclick="approvePost()">Approve Post</button>
        <button class="btn primary" id="schedule-btn" onclick="schedulePost()">Schedule Approved Post</button>
        <button class="btn danger" id="reject-btn" onclick="rejectPost()">Reject Post</button>
      </div>
      <p class="status-line" id="safety-note" style="margin-top:.7rem"></p>
    </div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
const brand = location.pathname.split('/')[1];
const brandName = brand.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
document.title = brandName + ' — Posts';
document.getElementById('brand-name').textContent = brandName;
document.getElementById('nav-refs').href = '/' + brand + '/refs.html';
document.getElementById('nav-ads').href = '/' + brand + '/ads.html';
document.getElementById('nav-posts').href = '/' + brand + '/posts.html';

let posts = [], ads = {approved:[]}, selected = null, filter = 'all', replaceTarget = null;

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function postUrl(action){return '/api/posts/' + encodeURIComponent(brand) + '/' + encodeURIComponent(selected.post_id) + '/' + action;}
async function api(action, body={}){
  const r = await fetch(postUrl(action), {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await r.json().catch(()=>({}));
  if(!r.ok || data.status === 'error') throw new Error(data.message || ('HTTP ' + r.status));
  return data;
}

async function loadAll(){
  document.getElementById('post-list').innerHTML = '<div class="loading">Loading</div>';
  const [pRes, aRes] = await Promise.all([fetch('/api/posts/' + brand, {cache:'no-store'}), fetch('/api/ads/' + brand, {cache:'no-store'})]);
  posts = await pRes.json();
  ads = await aRes.json();
  if(!selected && posts.length) selected = posts[0];
  if(selected) selected = posts.find(p=>p.post_id === selected.post_id) || posts[0];
  renderList(); renderPost(); renderPicker();
}

function renderList(){
  const list = document.getElementById('post-list');
  const filtered = filter === 'all' ? posts : posts.filter(p => (p.status || 'needs_review') === filter);
  document.getElementById('count-line').textContent = filtered.length + ' posts shown / ' + posts.length + ' total';
  if(!filtered.length){list.innerHTML = '<div class="empty">No posts here</div>'; return;}
  list.innerHTML = filtered.map(p => {
    const active = selected && selected.post_id === p.post_id ? ' active' : '';
    const status = p.status || 'needs_review';
    return `<div class="post-row${active}" onclick="selectPost('${esc(p.post_id)}')">
      <div class="title">${esc(p.creative_concept || p.post_id)}</div>
      <div class="meta"><span class="badge ${status}">${esc(status.replace('_',' '))}</span><span>${(p.ad_filenames||[]).length} ads</span><span>${(p.platforms||[]).join(' + ')}</span></div>
    </div>`;
  }).join('');
}

function selectPost(id){selected = posts.find(p=>p.post_id===id); replaceTarget = null; renderList(); renderPost();}

function renderPost(){
  const preview = document.getElementById('preview');
  if(!selected){preview.innerHTML = '<div class="empty">No composed posts yet</div>'; document.getElementById('post-title').textContent='Posts'; return;}
  const status = selected.status || 'needs_review';
  document.getElementById('post-title').textContent = selected.creative_concept || selected.post_id;
  const statusEl = document.getElementById('post-status');
  statusEl.textContent = status.replace('_',' ');
  statusEl.className = 'badge ' + status;
  document.getElementById('caption').value = selected.caption || '';
  document.querySelectorAll('.platforms input').forEach(cb => cb.checked = (selected.platforms || []).includes(cb.value));
  const locked = status === 'scheduled' || status === 'posted';
  document.getElementById('save-caption').disabled = locked;
  document.getElementById('regen-caption').disabled = locked;
  document.getElementById('approve-btn').disabled = locked || !selected.caption || !(selected.ad_filenames||[]).length;
  document.getElementById('schedule-btn').disabled = status !== 'approved';
  document.getElementById('reject-btn').disabled = locked;
  document.getElementById('safety-note').textContent = status === 'approved' ? 'This exact version is approved. Editing it will require approval again.' : 'Schedule stays locked until this exact post is approved.';

  const imgs = (selected.ad_filenames || []).map(f => `<div class="image-card">
    <img src="/public/images/ads/${brand}/${encodeURIComponent(f)}" alt="" onclick="window.open('/public/images/ads/${brand}/${encodeURIComponent(f)}','_blank')" onerror="this.style.display='none'">
    <div class="image-name">${esc(f)}</div>
    <div class="actions">
      <button onclick="removeAd('${esc(f)}','approved')">Remove</button>
      <button class="warn" onclick="removeAd('${esc(f)}','pending')">Pending</button>
      <button onclick="setReplaceTarget('${esc(f)}')">Replace</button>
      <button class="danger" onclick="removeAd('${esc(f)}','bad')">Bad</button>
    </div>
  </div>`).join('');
  preview.innerHTML = imgs ? '<div class="image-grid">' + imgs + '</div>' : '<div class="empty">No ads in this post</div>';
}

function renderPicker(){
  const picker = document.getElementById('approved-picker');
  const approved = ads.approved || [];
  picker.innerHTML = approved.length ? approved.map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join('') : '<option value="">No approved ads</option>';
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('button[data-filter]'); if(!btn) return;
  filter = btn.dataset.filter;
  document.querySelectorAll('#filters button').forEach(b=>b.classList.toggle('active', b===btn));
  renderList();
});

async function saveCaption(){if(!selected)return; try{await api('caption',{caption:document.getElementById('caption').value}); toast('Caption saved'); await loadAll();}catch(e){toast(e.message);}}
async function regenerateCaption(){if(!selected)return; try{await api('regenerate-caption'); toast('Caption regenerated'); await loadAll();}catch(e){toast(e.message);}}
async function savePlatforms(){if(!selected)return; const platforms=[...document.querySelectorAll('.platforms input:checked')].map(cb=>cb.value); try{await api('platforms',{platforms}); toast('Platforms saved'); await loadAll();}catch(e){toast(e.message);}}
async function approvePost(){if(!selected)return; try{await api('approve',{approved_by:'human'}); toast('Post approved'); await loadAll();}catch(e){toast(e.message);}}
async function rejectPost(){if(!selected||!confirm('Reject this post?'))return; try{await api('reject'); toast('Post rejected'); await loadAll();}catch(e){toast(e.message);}}
async function schedulePost(){if(!selected)return; if(!confirm('Schedule this approved post to selected platforms?'))return; try{await api('schedule'); toast('Scheduled'); await loadAll();}catch(e){toast(e.message);}}
async function removeAd(filename, disposition){if(disposition==='bad'&&!confirm('Mark this ad bad and remove it?'))return; try{await api('remove-ad',{filename,disposition}); toast('Ad updated'); await loadAll();}catch(e){toast(e.message);}}
function setReplaceTarget(filename){replaceTarget = filename; toast('Replacement target set');}
async function addApprovedAd(){
  if(!selected)return;
  const newFile = document.getElementById('approved-picker').value;
  if(!newFile)return;
  try{await api('replace-ad',{old_file:replaceTarget || '',new_file:newFile}); toast(replaceTarget ? 'Ad replaced' : 'Ad added'); replaceTarget=null; await loadAll();}catch(e){toast(e.message);}
}

loadAll();
</script>
</body>
</html>
